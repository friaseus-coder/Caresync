<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#89d0ec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#121c20",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>Patient Profile - María</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="max-w-md mx-auto bg-white dark:bg-slate-900 min-h-screen shadow-xl overflow-hidden flex flex-col">
<!-- Top App Bar -->
<div class="flex items-center p-4 justify-between border-b border-slate-100 dark:border-slate-800">
<div class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center">Patient Profile</h2>
<div class="flex w-10 items-center justify-end">
<button class="flex cursor-pointer items-center justify-center rounded-lg h-10 w-10 bg-transparent text-primary hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined">check</span>
</button>
</div>
</div>
<!-- Profile Header -->
<div class="flex p-6 flex-col items-center">
<div class="relative">
<div class="p-1 rounded-full bg-gradient-to-tr from-primary to-purple-300">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full h-32 w-32 border-4 border-white dark:border-slate-900" data-alt="Portrait of an elderly woman smiling warmly" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuC5n5gJbi4-5X259Ajcx2BpGOtCXPjZtStb5vv_LioQxBv01foeHglq3llY5j1YC0NqU0MnIzA2ulV3bW8oeEGjWe825V6kSLcdCWQ1cqJpx5PYCJ6OrHbtrW_7CjAhY4PRsdz4Ot67JdtJAcJnLD-YoZNzyteFPTtJ1q2cCBMWa7RVSXF3ZdXm_ADDpkgOT6TpgBXYePvtKd5uKbQPA3G28onQGZnrq1FCNyBlDdfpJtZoKsqWg_EnBct-O1OZJMIeqbcaCUGBVb0");'>
</div>
</div>
<button class="absolute bottom-0 right-0 bg-primary text-white p-2 rounded-full shadow-lg flex items-center justify-center hover:scale-105 transition-transform">
<span class="material-symbols-outlined text-sm">edit</span>
</button>
</div>
<div class="mt-4 flex flex-col items-center">
<p class="text-slate-900 dark:text-slate-100 text-2xl font-bold">María</p>
<p class="text-slate-500 dark:text-slate-400 text-sm">Madre • 72 años</p>
</div>
</div>
<!-- Personalization & Color Picker -->
<div class="px-6 py-4 border-t border-slate-50 dark:border-slate-800">
<h3 class="text-slate-900 dark:text-slate-100 text-base font-bold mb-3">Personalization</h3>
<p class="text-slate-500 dark:text-slate-400 text-sm mb-4">Patient Color Context</p>
<div class="flex gap-4 overflow-x-auto pb-2 no-scrollbar">
<label class="size-10 shrink-0 rounded-full border-2 border-transparent ring-primary ring-offset-2 has-[:checked]:ring-2 cursor-pointer transition-all" style="background-color: #E6E6FA;">
<input checked="" class="hidden" name="color-context" type="radio"/>
</label>
<label class="size-10 shrink-0 rounded-full border-2 border-transparent ring-primary ring-offset-2 has-[:checked]:ring-2 cursor-pointer transition-all" style="background-color: #FFD1DC;">
<input class="hidden" name="color-context" type="radio"/>
</label>
<label class="size-10 shrink-0 rounded-full border-2 border-transparent ring-primary ring-offset-2 has-[:checked]:ring-2 cursor-pointer transition-all" style="background-color: #B0E0E6;">
<input class="hidden" name="color-context" type="radio"/>
</label>
<label class="size-10 shrink-0 rounded-full border-2 border-transparent ring-primary ring-offset-2 has-[:checked]:ring-2 cursor-pointer transition-all" style="background-color: #F0FFF0;">
<input class="hidden" name="color-context" type="radio"/>
</label>
<label class="size-10 shrink-0 rounded-full border-2 border-transparent ring-primary ring-offset-2 has-[:checked]:ring-2 cursor-pointer transition-all" style="background-color: #FFFACD;">
<input class="hidden" name="color-context" type="radio"/>
</label>
<label class="size-10 shrink-0 rounded-full border-2 border-transparent ring-primary ring-offset-2 has-[:checked]:ring-2 cursor-pointer transition-all" style="background-color: #89d0ec;">
<input class="hidden" name="color-context" type="radio"/>
</label>
</div>
</div>
<!-- Information Fields -->
<div class="px-6 py-4 space-y-4">
<div class="space-y-1">
<label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Full Name</label>
<div class="w-full p-3 bg-slate-50 dark:bg-slate-800 rounded-lg text-slate-900 dark:text-slate-100 font-medium border border-slate-100 dark:border-slate-700">
                    María
                </div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1">
<label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Age</label>
<div class="w-full p-3 bg-slate-50 dark:bg-slate-800 rounded-lg text-slate-900 dark:text-slate-100 font-medium border border-slate-100 dark:border-slate-700">
                        72
                    </div>
</div>
<div class="space-y-1">
<label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Relation</label>
<div class="w-full p-3 bg-slate-50 dark:bg-slate-800 rounded-lg text-slate-900 dark:text-slate-100 font-medium border border-slate-100 dark:border-slate-700">
                        Madre
                    </div>
</div>
</div>
<div class="space-y-1">
<label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">General Notes</label>
<div class="w-full p-3 bg-primary/10 dark:bg-primary/5 rounded-lg text-slate-900 dark:text-slate-100 font-medium border border-primary/20 flex items-start gap-2">
<span class="material-symbols-outlined text-primary text-sm mt-0.5">warning</span>
<span>Alérgica a la penicilina</span>
</div>
</div>
</div>
<!-- Active Medications -->
<div class="px-6 py-4 flex-1">
<div class="flex items-center justify-between mb-4">
<h3 class="text-slate-900 dark:text-slate-100 text-base font-bold">Active Medications</h3>
<button class="text-primary text-sm font-bold flex items-center gap-1">
<span class="material-symbols-outlined text-lg">add_circle</span>
                    Add
                </button>
</div>
<div class="space-y-3">
<!-- Med 1 -->
<div class="flex items-center p-3 bg-white dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700 shadow-sm hover:shadow-md transition-shadow">
<div class="h-12 w-12 rounded-lg bg-slate-100 dark:bg-slate-700 overflow-hidden shrink-0 flex items-center justify-center">
<img class="h-full w-full object-cover" data-alt="Pack of blue pills in blister" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAFSwT-5aadFHMhGKEa4rO9c6iSh69JjLHqZZ_fnc_9LYb39YDAG7itEm8ZRp7J9vBqXAaiotVlQlIBadyR7X21hVxOzUy8GdyOX_1tfo4J2xT8ag0KPQkgUxV_x1YYErQftFN53o2Q6zbY2E8xUzWXUHc66LdWYYOs1l3Wa4Rwn6SzXZ0C2cmoDOsTQtAQjlr9epFFw-KBRKIF6WCRnsDCSg1RmENovG5xeU43hv-SukdBQ3hdkRbffgDjZIUuE9TG_1FVTVoMdH4"/>
</div>
<div class="ml-4 flex-1">
<p class="text-slate-900 dark:text-slate-100 text-sm font-bold">Lisinopril</p>
<p class="text-slate-500 dark:text-slate-400 text-xs">10mg • Daily morning</p>
</div>
<span class="material-symbols-outlined text-slate-300">chevron_right</span>
</div>
<!-- Med 2 -->
<div class="flex items-center p-3 bg-white dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700 shadow-sm hover:shadow-md transition-shadow">
<div class="h-12 w-12 rounded-lg bg-slate-100 dark:bg-slate-700 overflow-hidden shrink-0 flex items-center justify-center">
<img class="h-full w-full object-cover" data-alt="White medicine bottle on table" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD-jDf7J-Q_noS3E7vqmgoOkNnibHrSVI3lIC2-OBzqW7GLxOyWB9a7JZGOS6tHXz4i4Gv9Dfx_IpfQgIe3t1fqAifiQXzbL8ajNpQOOfTd0rDfsEtE0w8gzxynDN2_DoEEtme3XwSvLwsUEC_dhNC3udgi0NDvquImmr_In5yrLmoyXniZ_bZPYg7aqSGRKNjcwv2Yuj5N6vj1rPxBa7QhilzSHta2aubuweNlfL4-92K-BwqxGyJxVJqr8KimDEfv4BAljnbP3Lw"/>
</div>
<div class="ml-4 flex-1">
<p class="text-slate-900 dark:text-slate-100 text-sm font-bold">Atorvastatin</p>
<p class="text-slate-500 dark:text-slate-400 text-xs">20mg • Daily night</p>
</div>
<span class="material-symbols-outlined text-slate-300">chevron_right</span>
</div>
</div>
</div>
<!-- Spacer for bottom scroll padding -->
<div class="h-8"></div>
</div>
<style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</body></html>
